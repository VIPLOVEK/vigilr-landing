name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging ${SUPABASE_URL}..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SUPABASE_URL}/auth/v1/health")
          echo "Auth health responded with HTTP $STATUS"
          STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "${SUPABASE_URL}/rest/v1/" -H "apikey: ${SUPABASE_ANON_KEY}" -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "REST API responded with HTTP $STATUS2"
          if [ "$STATUS" = "000" ] && [ "$STATUS2" = "000" ]; then
            echo "Could not reach Supabase at all — check SUPABASE_URL secret"
            exit 1
          fi
          echo "Ping complete. Project is active."

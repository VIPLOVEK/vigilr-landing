name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC (well within the 7-day inactivity window)
    - cron: "0 8 */3 * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
